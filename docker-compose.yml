services:
  mysql:
    image: mysql:8.0
    container_name: ai-novel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_passage_creator}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
      - ./sql/update_quota.sql:/docker-entrypoint-initdb.d/02_update_quota.sql:ro
      - ./sql/add_phase_fields.sql:/docker-entrypoint-initdb.d/03_add_phase_fields.sql:ro
      - ./sql/add_article_style.sql:/docker-entrypoint-initdb.d/04_add_article_style.sql:ro
      - ./sql/add_vip_payment.sql:/docker-entrypoint-initdb.d/05_add_vip_payment.sql:ro
      - ./sql/create_novel_tables.sql:/docker-entrypoint-initdb.d/06_create_novel_tables.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=256M

  redis:
    image: redis:7-alpine
    container_name: ai-novel-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command:
      - sh
      - -c
      - redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-novel-python-backend:latest
    container_name: ai-novel-backend
    restart: unless-stopped
    environment: &backend-env
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8123
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_passage_creator}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NOVEL_QUEUE_ENABLED: "true"
      NOVEL_QUEUE_NAME: ${NOVEL_QUEUE_NAME:-ai_novel_tasks}
      LLM_PROVIDER: ${LLM_PROVIDER:-dashscope}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL_PLAN: ${LLM_MODEL_PLAN:-}
      LLM_MODEL_WRITE: ${LLM_MODEL_WRITE:-}
      LLM_MODEL_AUDIT: ${LLM_MODEL_AUDIT:-}
      LLM_MODEL_REVISE: ${LLM_MODEL_REVISE:-}
      LLM_MODEL_ARCHIVE: ${LLM_MODEL_ARCHIVE:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      NANO_BANANA_API_KEY: ${NANO_BANANA_API_KEY:-}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-guangzhou}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      TENCENT_COS_DOMAIN: ${TENCENT_COS_DOMAIN:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost/vip?success=true}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost/vip?cancelled=true}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-in-production}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-2592000}
      PASSWORD_SALT: ${PASSWORD_SALT:-yupi}
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

  worker:
    image: ai-novel-python-backend:latest
    container_name: ai-novel-worker
    restart: unless-stopped
    command: ["arq", "app.workers.novel_worker.WorkerSettings"]
    environment:
      <<: *backend-env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-novel-frontend:latest
    container_name: ai-novel-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  app-network:
    driver: bridge
    name: ai-novel-network

volumes:
  mysql-data:
    name: ai-novel-mysql-data
  redis-data:
    name: ai-novel-redis-data
