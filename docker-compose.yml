# ========================================
# AI 爆款文章创作器 - Docker Compose 配置
# ========================================
# 使用方法：
#   1. 复制 .env.example 为 .env 并填写 API Key
#   2. 运行: docker compose up -d --build
#   3. 访问: http://localhost
# ========================================

services:
  # ============ MySQL 数据库 ============
  mysql:
    image: mysql:8.0
    container_name: ai-passage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_passage_creator}
      TZ: ${TZ:-Asia/Shanghai}
    # 暴露端口到宿主机（本地开发需要）
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # SQL 初始化脚本（按文件名字母顺序执行）
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
      - ./sql/update_quota.sql:/docker-entrypoint-initdb.d/02_update_quota.sql:ro
      - ./sql/add_phase_fields.sql:/docker-entrypoint-initdb.d/03_add_phase_fields.sql:ro
      - ./sql/add_article_style.sql:/docker-entrypoint-initdb.d/04_add_article_style.sql:ro
      - ./sql/add_vip_payment.sql:/docker-entrypoint-initdb.d/05_add_vip_payment.sql:ro
      - ./sql/create_novel_tables.sql:/docker-entrypoint-initdb.d/06_create_novel_tables.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=256M

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: ai-passage-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 暴露端口到宿主机（本地开发需要）
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}

  # ============ 后端服务（Python） ============
  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ai-passage-python-backend:latest
    container_name: ai-passage-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # 数据库配置（Docker 内部网络用 mysql 容器名）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_passage_creator}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # AI 配置（必需）
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?请在 .env 中设置 DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      # Pexels 配置
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      # Nano Banana 配置（可选）
      NANO_BANANA_API_KEY: ${NANO_BANANA_API_KEY:-}
      # 腾讯云 COS 配置（可选）
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-guangzhou}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      # Session 配置
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-your-secret-key}
      PASSWORD_SALT: ${PASSWORD_SALT:-yupi}
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============ 前端服务 ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ai-passage-frontend:latest
    container_name: ai-passage-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============ 网络配置 ============
networks:
  app-network:
    driver: bridge
    name: ai-passage-network

# ============ 数据卷配置 ============
volumes:
  mysql-data:
    name: ai-passage-mysql-data
  redis-data:
    name: ai-passage-redis-data
